<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <title>CRUD MINI PROJECT</title>

  <style>
    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center center/cover;
      min-height: 100vh;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      padding: 40px 0;
    }

    .card-custom {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
      padding: 20px;
    }

    .table {
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    h2 {
      font-weight: 600;
    }
    .card-custom {
      height: 100%;
    }
    .table-container {
      max-height: 250px;   /* approx 5 rows */
      overflow-y: auto;
    }
  </style>
</head>

<body>

<div class="overlay">

  <div class="container-fluid px-4">
    <nav class="navbar navbar-dark bg-dark mb-4 rounded">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">CRUD MINI PROJECT</span>

        <a href="/logout/" class="btn btn-danger"
           onclick="return confirm('Are you sure you want to logout?')">
           <i class="bi bi-box-arrow-right"></i> Logout
        </a>
      </div>
    </nav>
    <div class="row g-3 align-items-stretch">

      <!-- LEFT FORM -->
      <div class="col-md-3 d-flex">
        <div class="card-custom w-100">
          <h4 class="text-center mb-3">Insert Student</h4>

          <form action="/insert/" method="post">
            {% csrf_token %}

            <input type="text" class="form-control mb-2" placeholder="Name" name="name" required>

            <input type="email" class="form-control mb-2" placeholder="Email" name="email" required>

            <input type="number" class="form-control mb-2" placeholder="Age" name="age" required>

            <select class="form-control mb-3" name="gender" required>
              <option selected disabled>Select Gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Others</option>
            </select>

            <div class="d-grid">
              <button class="btn btn-success">Submit</button>
            </div>
          </form>
        </div>
      </div>

      <!-- RIGHT TABLE -->
      <div class="col-md-9 d-flex">
        <div class="card-custom w-100">
          <form method="GET" class="mb-3 d-flex">
            <input type="text" name="q" class="form-control me-2"
                   placeholder="Search by name or email"
                   value="{{ request.GET.q }}">
            
            <button class="btn btn-primary">
              <i class="bi bi-search"></i>
            </button>
            <a href="{% url 'index' %}" class="btn btn-secondary">
              <i class="bi bi-arrow-clockwise"></i>
            </a>
          </form>

          <h4 class="text-center mb-3">Student Details</h4>

          {% for message in messages %}
          <div class="alert alert-{{message.tags}} alert-dismissible fade show">
            {{message}}
          </div>
          {% endfor %}

          <div class="table-responsive table-container">
          <table class="table table-hover text-center align-middle">
            <thead class="table-dark">
              <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Email</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Edit</th>
                <th>Delete</th>
              </tr>
            </thead>

            <tbody>
              {% for d in data %}
              <tr>
                <td>{{d.id}}</td>
                <td>{{d.name}}</td>
                <td>{{d.email}}</td>
                <td>{{d.age}}</td>
                <td>{{d.gender}}</td>

                <td>
                  <a href="/update/{{d.id}}" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil-square"></i>
                  </a>
                </td>

                <td>
                  <a href="/delete/{{d.id}}" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash"></i>
                  </a>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>

        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
