<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>CRUD MINI PROJECT UPDATE</title>

  <style>
    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb') no-repeat center center/cover;
      min-height: 100vh;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.6);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-custom {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
      padding: 30px;
      width: 400px;
    }
  </style>
</head>

<body>

<div class="overlay">

  <div class="card-custom">

    <h4 class="text-center mb-3">Update Student</h4>

    <form action="/update/{{d.id}}/" method="post">
      {% csrf_token %}

      <input type="text" class="form-control mb-3" name="name" value="{{d.name}}" required>

      <input type="email" class="form-control mb-3" name="email" value="{{d.email}}" required>

      <input type="number" class="form-control mb-3" name="age" value="{{d.age}}" required>

      <select class="form-control mb-3" name="gender" required>
        <option disabled>Select Gender</option>
        <option {% if d.gender == "Male" %}selected{% endif %}>Male</option>
        <option {% if d.gender == "Female" %}selected{% endif %}>Female</option>
        <option {% if d.gender == "Others" %}selected{% endif %}>Others</option>
      </select>

      <div class="d-grid">
        <button class="btn btn-success">Update</button>
      </div>

      <!-- Back Button -->
      <a href="/dashboard/" class="btn btn-secondary mt-3 w-100">Back</a>

    </form>

  </div>

</div>

</body>
</html>
